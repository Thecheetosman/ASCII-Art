<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRICT INDUSTRIAL ASCII v6.0</title>
    <style>
        :root {
            --bg-color: #050505;
            --container-bg: #000;
            --text-color: #8c8c8c;
            --accent-color: #9e1a1a;
            --border-color: #3a0000;
            --pre-color: #d1d1d1;
        }

        body.light-theme {
            --bg-color: #e0e0e0;
            --container-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #d32f2f;
            --border-color: #9e9e9e;
            --pre-color: #000000;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--bg-color); 
            color: var(--text-color); 
            text-align: center; 
            padding: 20px;
            text-transform: uppercase;
            border: 8px solid var(--border-color);
            min-height: 90vh;
            transition: all 0.3s ease;
        }

        body.drag-over {
            background: var(--border-color);
            border-style: dashed;
        }

        h2 { 
            color: var(--accent-color); 
            letter-spacing: 2px; 
            border-bottom: 2px solid var(--border-color); 
            display: inline-block; 
            margin-top: 0;
        }
        
        #output-container {
            margin-top: 20px;
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            display: inline-block;
            max-width: 95vw;
            overflow: auto;
            position: relative;
        }

        pre { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 10px; 
            line-height: 10px;
            letter-spacing: 0;
            white-space: pre;
            margin: 0;
            padding: 15px;
            color: var(--pre-color);
            display: block;
            text-align: left;
        }

        .controls { 
            margin-bottom: 20px; 
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            display: inline-block;
            border: 1px solid var(--border-color);
            max-width: 900px;
            width: 100%;
        }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        #videoControls {
            background: rgba(158, 26, 26, 0.05);
            border: 1px dashed var(--accent-color);
            padding: 10px;
            display: none;
            width: 95%;
            margin: 0 auto 15px auto;
        }

        button, input[type="file"], input[type="number"], input[type="text"], select { 
            padding: 8px 12px; 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--container-bg);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover, input[type="file"]:hover::-webkit-file-upload-button { 
            background: var(--accent-color); 
            color: #fff; 
            cursor: pointer; 
        }

        input[type="number"] { width: 80px; }
        input[type="text"] { width: 150px; }

        input[type="file"]::-webkit-file-upload-button {
            background: var(--container-bg);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            font-family: inherit;
            cursor: pointer;
        }
        
        label { display: flex; align-items: center; gap: 5px; font-size: 14px; }
        
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="range"] { accent-color: var(--accent-color); }
        input[type="checkbox"] { accent-color: var(--accent-color); width: 16px; height: 16px; }

        .value-display {
            display: inline-block;
            width: 40px;
            text-align: left;
            color: var(--accent-color);
        }

        #charCountDisplay {
            font-weight: bold;
            padding: 4px 8px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .limit-exceeded {
            color: #ff0000 !important;
            border-color: #ff0000 !important;
            background: rgba(255, 0, 0, 0.1);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h2>Terminal: Media-to-ASCII</h2>
    
    <div class="controls">
        <div class="control-group">
            <input type="file" id="upload" accept="image/*,video/*" title="Drag & drop images or videos">
            
            <select id="charMode">
                <option value="detailed">Mode: Detailed ASCII</option>
                <option value="standard">Mode: Standard ASCII</option>
                <option value="blocks">Mode: Unicode Blocks</option>
                <option value="braille">Mode: Braille (Dot Art)</option>
                <option value="custom">Mode: Custom Input</option>
            </select>

            <input type="text" id="customInput" value=" .-=+*#%@" style="display: none;" title="Custom character ramp from dark to light">

            <label><input type="checkbox" id="invertCheck"> Invert Colors</label>
            <label><input type="checkbox" id="themeCheck"> Light Preview</label>
            <label><input type="checkbox" id="ditherCheck"> Dithering</label>
        </div>

        <div class="control-group" id="videoControls">
            <button id="playPauseBtn" style="width: 100px;">[ PLAY ]</button>
            <div class="slider-wrapper" style="flex-grow: 1;">
                <input type="range" id="videoSlider" min="0" max="100" step="0.05" value="0" style="width: 100%;">
            </div>
            <span class="value-display" id="timeDisplay" style="width: 100px; text-align: right;">0.0s / 0.0s</span>
        </div>

        <div class="control-group">
            <div class="slider-wrapper">
                <label>Width:</label>
                <input type="range" id="widthSlider" min="20" max="300" value="100">
                <span class="value-display" id="widthValue">100</span>
            </div>

            <div class="slider-wrapper">
                <label>Aspect:</label>
                <input type="range" id="ratioSlider" min="0.1" max="1.0" step="0.01" value="0.45">
                <span class="value-display" id="ratioValue">0.45</span>
            </div>

            <div class="slider-wrapper">
                <label>Contrast:</label>
                <input type="range" id="contrastSlider" min="50" max="200" value="100">
                <span class="value-display" id="contrastValue">100</span>
            </div>
            
            <div class="slider-wrapper" id="thresholdContainer" style="display: none;">
                <label>Braille Thrsh:</label>
                <input type="range" id="thresholdSlider" min="1" max="254" value="128">
                <span class="value-display" id="thresholdValue">128</span>
            </div>
        </div>

        <div class="control-group" style="margin-bottom: 0;">
            <div class="slider-wrapper">
                <label>Limit:</label>
                <input type="number" id="charLimitInput" value="2000" min="0" title="Set to 0 to disable limit">
            </div>
            <span id="charCountDisplay">0 / 2000 CHARS</span>
            
            <div style="flex-grow: 1;"></div>
            
            <button id="copyBackticksBtn">[ COPY ``` ]</button>
            <button id="copyTildesBtn">[ COPY ~~~ ]</button>
            <button id="downloadBtn">[ DL .TXT ]</button>
            <button id="downloadPngBtn">[ DL .PNG ]</button>
            <button id="recordVideoBtn" style="display: none; border-color: #ff0000; color: #ff0000;">[ RECORD .WEBM ]</button>
        </div>
    </div>

    <br>

    <div id="output-container">
        <pre id="output">WAITING FOR INPUT... (DRAG AND DROP IMAGE OR VIDEO HERE)</pre>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const output = document.getElementById('output');
        const widthSlider = document.getElementById('widthSlider');
        const widthValue = document.getElementById('widthValue');
        const ratioSlider = document.getElementById('ratioSlider');
        const ratioValue = document.getElementById('ratioValue');
        const contrastSlider = document.getElementById('contrastSlider');
        const contrastValue = document.getElementById('contrastValue');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdValue = document.getElementById('thresholdValue');
        const thresholdContainer = document.getElementById('thresholdContainer');
        const charMode = document.getElementById('charMode');
        const customInput = document.getElementById('customInput');
        const invertCheck = document.getElementById('invertCheck');
        const themeCheck = document.getElementById('themeCheck');
        const ditherCheck = document.getElementById('ditherCheck');
        
        const copyBackticksBtn = document.getElementById('copyBackticksBtn');
        const copyTildesBtn = document.getElementById('copyTildesBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadPngBtn = document.getElementById('downloadPngBtn');
        const recordVideoBtn = document.getElementById('recordVideoBtn');
        
        const charLimitInput = document.getElementById('charLimitInput');
        const charCountDisplay = document.getElementById('charCountDisplay');
        
        const videoControls = document.getElementById('videoControls');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const videoSlider = document.getElementById('videoSlider');
        const timeDisplay = document.getElementById('timeDisplay');

        const ramps = {
            standard: " .:-=+*#%@",
            detailed: " .'`^\\\",:;Il!i><~+_-?][}{1)(|\\\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$",
            blocks: " ░▒▓█"
        };

        const brailleMap = [
            [0, 0, 0x01], [1, 0, 0x08],
            [0, 1, 0x02], [1, 1, 0x10],
            [0, 2, 0x04], [1, 2, 0x20],
            [0, 3, 0x40], [1, 3, 0x80]
        ];

        let img = new Image();
        let video = document.createElement('video');
        video.muted = true;
        video.playsInline = true;
        
        let isVideo = false;
        let currentMediaUrl = null;
        let drawTimeout;
        let lastDrawTime = 0;

        // Video Recording Variables
        let recordCanvas = document.createElement('canvas');
        let recordCtx = recordCanvas.getContext('2d');
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('drag-over');
        });

        document.body.addEventListener('dragleave', () => {
            document.body.classList.remove('drag-over');
        });

        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.classList.remove('drag-over');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                loadMedia(e.dataTransfer.files[0]);
            }
        });

        upload.addEventListener('change', (e) => {
            if (e.target.files[0]) loadMedia(e.target.files[0]);
        });

        function loadMedia(file) {
            if (currentMediaUrl) URL.revokeObjectURL(currentMediaUrl);
            currentMediaUrl = URL.createObjectURL(file);

            if (file.type.startsWith('video/')) {
                isVideo = true;
                videoControls.style.display = 'flex';
                recordVideoBtn.style.display = 'inline-block';
                output.textContent = "LOADING VIDEO...";
                video.src = currentMediaUrl;
                playPauseBtn.textContent = "[ PLAY ]";
            } else if (file.type.startsWith('image/')) {
                isVideo = false;
                videoControls.style.display = 'none';
                recordVideoBtn.style.display = 'none';
                output.textContent = "LOADING IMAGE...";
                img.src = currentMediaUrl;
                video.pause();
            } else {
                alert('Please upload a valid fucking image or video file.');
            }
        }

        img.onload = () => draw();

        video.addEventListener('loadedmetadata', () => {
            videoSlider.max = video.duration;
            updateTimeDisplay();
            draw();
        });

        video.addEventListener('seeked', () => {
            if (video.paused && !isRecording) draw(); 
        });

        video.addEventListener('timeupdate', () => {
            if (!video.paused) {
                videoSlider.value = video.currentTime;
                updateTimeDisplay();
            }
        });

        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playPauseBtn.textContent = "[ PAUSE ]";
                requestAnimationFrame(playLoop);
            } else {
                video.pause();
                playPauseBtn.textContent = "[ PLAY ]";
            }
        });

        videoSlider.addEventListener('input', (e) => {
            if (isRecording) return; // Prevent scrubbing while recording
            video.currentTime = e.target.value;
            updateTimeDisplay();
            if (video.paused) debouncedDraw();
        });

        function updateTimeDisplay() {
            const cur = video.currentTime || 0;
            const max = video.duration || 0;
            timeDisplay.textContent = `${cur.toFixed(1)}s / ${max.toFixed(1)}s`;
        }

        function playLoop(timestamp) {
            if (video.paused || video.ended) {
                if (video.ended) {
                    playPauseBtn.textContent = "[ PLAY ]";
                    if (isRecording) {
                        mediaRecorder.stop();
                    }
                }
                return;
            }
            // Approx 16-20fps to avoid destroying the CPU, run faster if recording to get smooth frames
            let delay = isRecording ? 30 : 60; 
            if (timestamp - lastDrawTime >= delay) {
                draw();
                if (isRecording) {
                    paintRecordCanvas();
                }
                lastDrawTime = timestamp;
            }
            requestAnimationFrame(playLoop);
        }

        function debouncedDraw() {
            clearTimeout(drawTimeout);
            drawTimeout = setTimeout(draw, 30);
        }
        
        widthSlider.addEventListener('input', () => { widthValue.textContent = widthSlider.value; debouncedDraw(); });
        ratioSlider.addEventListener('input', () => { ratioValue.textContent = ratioSlider.value; debouncedDraw(); });
        contrastSlider.addEventListener('input', () => { contrastValue.textContent = contrastSlider.value; debouncedDraw(); });
        thresholdSlider.addEventListener('input', () => { thresholdValue.textContent = thresholdSlider.value; debouncedDraw(); });
        charLimitInput.addEventListener('input', debouncedDraw);
        customInput.addEventListener('input', debouncedDraw);
        invertCheck.addEventListener('change', draw);
        ditherCheck.addEventListener('change', draw);
        themeCheck.addEventListener('change', (e) => { document.body.classList.toggle('light-theme', e.target.checked); });
        charMode.addEventListener('change', (e) => {
            thresholdContainer.style.display = e.target.value === 'braille' ? 'flex' : 'none';
            customInput.style.display = e.target.value === 'custom' ? 'inline-block' : 'none';
            if(e.target.value === 'braille' && parseFloat(ratioSlider.value) < 0.48) {
                ratioSlider.value = 0.50;
                ratioValue.textContent = "0.50";
            }
            draw();
        });

        function draw() {
            const source = isVideo ? video : img;
            const sWidth = isVideo ? video.videoWidth : img.width;
            const sHeight = isVideo ? video.videoHeight : img.height;

            if (!sWidth || !sHeight) return; 

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            const outWidthChars = parseInt(widthSlider.value);
            const fontAspectRatio = parseFloat(ratioSlider.value);
            const contrast = parseInt(contrastSlider.value);
            const mode = charMode.value;
            const invert = invertCheck.checked;
            const dither = ditherCheck.checked;
            
            let asciiStr = "";

            ctx.filter = `contrast(${contrast}%)`;

            if (mode === 'braille') {
                const outHeightChars = Math.floor((sHeight / sWidth) * outWidthChars * fontAspectRatio);
                const pixelWidth = outWidthChars * 2;
                const pixelHeight = outHeightChars * 4;

                canvas.width = pixelWidth;
                canvas.height = pixelHeight;
                ctx.drawImage(source, 0, 0, pixelWidth, pixelHeight);
                const imgData = ctx.getImageData(0, 0, pixelWidth, pixelHeight);
                const pixels = imgData.data;
                const threshold = parseInt(thresholdSlider.value);

                let grayBuffer = new Float32Array(pixelWidth * pixelHeight);
                for(let i=0; i < pixels.length; i+=4) {
                    grayBuffer[i/4] = (0.299 * pixels[i] + 0.587 * pixels[i+1] + 0.114 * pixels[i+2]);
                }

                for (let y = 0; y < outHeightChars; y++) {
                    for (let x = 0; x < outWidthChars; x++) {
                        const px = x * 2;
                        const py = y * 4;
                        let brailleChar = 0;

                        for (let i = 0; i < brailleMap.length; i++) {
                            const dx = brailleMap[i][0];
                            const dy = brailleMap[i][1];
                            const val = brailleMap[i][2];
                            
                            const cx = px + dx;
                            const cy = py + dy;
                            const idx = cy * pixelWidth + cx;
                            
                            let oldBrightness = grayBuffer[idx];
                            let isSolid = invert ? (oldBrightness <= threshold) : (oldBrightness > threshold);
                            
                            if (dither) {
                                let newBrightness = isSolid ? (invert ? 0 : 255) : (invert ? 255 : 0);
                                let err = oldBrightness - newBrightness;
                                
                                if(cx+1 < pixelWidth) grayBuffer[idx+1] += err * 7/16;
                                if(cx-1 >= 0 && cy+1 < pixelHeight) grayBuffer[idx+pixelWidth-1] += err * 3/16;
                                if(cy+1 < pixelHeight) grayBuffer[idx+pixelWidth] += err * 5/16;
                                if(cx+1 < pixelWidth && cy+1 < pixelHeight) grayBuffer[idx+pixelWidth+1] += err * 1/16;
                            }

                            if (isSolid) brailleChar += val;
                        }
                        asciiStr += String.fromCharCode(0x2800 + brailleChar);
                    }
                    asciiStr += "\n";
                }
            } else {
                const pixelHeight = Math.floor((sHeight / sWidth) * outWidthChars * fontAspectRatio);
                
                canvas.width = outWidthChars;
                canvas.height = pixelHeight;
                ctx.drawImage(source, 0, 0, outWidthChars, pixelHeight);
                
                const pixels = ctx.getImageData(0, 0, outWidthChars, pixelHeight).data;
                let ramp = mode === 'custom' ? customInput.value : ramps[mode];
                if (!ramp) ramp = " "; 
                if (invert) ramp = ramp.split('').reverse().join('');

                let grayBuffer = new Float32Array(outWidthChars * pixelHeight);
                for(let i=0; i < pixels.length; i+=4) {
                    grayBuffer[i/4] = pixels[i+3] === 0 ? 255 : (0.299 * pixels[i] + 0.587 * pixels[i+1] + 0.114 * pixels[i+2]);
                }

                let step = 255 / Math.max(1, (ramp.length - 1));

                for (let y = 0; y < pixelHeight; y++) {
                    for (let x = 0; x < outWidthChars; x++) {
                        const idx = y * outWidthChars + x;
                        let oldBrightness = grayBuffer[idx];
                        
                        let charIndex = Math.round(oldBrightness / step);
                        if (charIndex < 0) charIndex = 0;
                        if (charIndex >= ramp.length) charIndex = ramp.length - 1;

                        if (dither) {
                            let newBrightness = charIndex * step;
                            let err = oldBrightness - newBrightness;

                            if(x+1 < outWidthChars) grayBuffer[idx+1] += err * 7/16;
                            if(x-1 >= 0 && y+1 < pixelHeight) grayBuffer[idx+outWidthChars-1] += err * 3/16;
                            if(y+1 < pixelHeight) grayBuffer[idx+outWidthChars] += err * 5/16;
                            if(x+1 < outWidthChars && y+1 < pixelHeight) grayBuffer[idx+outWidthChars+1] += err * 1/16;
                        }

                        asciiStr += ramp[charIndex];
                    }
                    asciiStr += "\n";
                }
            }
            
            output.textContent = asciiStr;

            const charLimit = parseInt(charLimitInput.value) || 0;
            const currentLength = asciiStr.length;

            if (charLimit > 0) {
                charCountDisplay.textContent = `${currentLength} / ${charLimit} CHARS`;
                if (currentLength > charLimit) {
                    charCountDisplay.classList.add('limit-exceeded');
                } else {
                    charCountDisplay.classList.remove('limit-exceeded');
                }
            } else {
                charCountDisplay.textContent = `${currentLength} CHARS`;
                charCountDisplay.classList.remove('limit-exceeded');
            }
        }

        function paintRecordCanvas() {
            if(!output.textContent) return;
            const lines = output.textContent.split('\n');
            if(lines[lines.length-1] === '') lines.pop(); 

            const fontSize = 10;
            const lineHeight = 10;
            
            const isLight = document.body.classList.contains('light-theme');
            recordCtx.fillStyle = isLight ? '#ffffff' : '#000000';
            recordCtx.fillRect(0, 0, recordCanvas.width, recordCanvas.height);
            
            recordCtx.fillStyle = isLight ? '#000000' : '#d1d1d1';
            recordCtx.textAlign = 'left';
            recordCtx.textBaseline = 'top';
            recordCtx.font = `${fontSize}px 'Courier New', Courier, monospace`;
            
            for(let i=0; i<lines.length; i++) {
                recordCtx.fillText(lines[i], 15, 15 + (i * lineHeight));
            }
        }

        recordVideoBtn.addEventListener('click', () => {
            if(!isVideo) return alert("Upload a fucking video first.");
            if(isRecording) return;
            
            let confirmMsg = "This will rewind your video and record every frame as an ASCII output into a .webm file. It is heavy on the CPU. Do you wish to proceed?";
            if(!confirm(confirmMsg)) return;

            isRecording = true;
            recordVideoBtn.textContent = "[ RECORDING... ]";
            recordVideoBtn.style.color = "#ffffff";
            recordVideoBtn.style.backgroundColor = "#ff0000";

            draw(); // Ensure current frame is processed to get dimensions
            const lines = output.textContent.split('\n');
            if(lines[lines.length-1] === '') lines.pop(); 

            const fontSize = 10;
            const lineHeight = 10;
            recordCtx.font = `${fontSize}px 'Courier New', Courier, monospace`;
            
            let maxWidth = 0;
            for(let line of lines) {
                let metrics = recordCtx.measureText(line);
                if(metrics.width > maxWidth) maxWidth = metrics.width;
            }
            
            recordCanvas.width = maxWidth + 30; 
            recordCanvas.height = (lines.length * lineHeight) + 30;

            const stream = recordCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            recordedChunks = [];

            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ascii_rendered_video.webm';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                isRecording = false;
                recordVideoBtn.textContent = "[ RECORD .WEBM ]";
                recordVideoBtn.style.color = "#ff0000";
                recordVideoBtn.style.backgroundColor = "transparent";
                alert("Fucking done. Download should start now.");
            };

            video.currentTime = 0;
            mediaRecorder.start();
            video.play();
            playPauseBtn.textContent = "[ PAUSE ]";
            requestAnimationFrame(playLoop);
        });

        copyBackticksBtn.addEventListener('click', () => {
            if(!currentMediaUrl) return alert("Upload fucking media first.");
            const forumReadyText = "```text\n" + output.textContent + "\n```";
            navigator.clipboard.writeText(forumReadyText);
            
            const originalText = copyBackticksBtn.textContent;
            copyBackticksBtn.textContent = "[ COPIED! ]";
            setTimeout(() => copyBackticksBtn.textContent = originalText, 2000);
        });

        copyTildesBtn.addEventListener('click', () => {
            if(!currentMediaUrl) return alert("Upload fucking media first.");
            const forumReadyText = "~~~\n" + output.textContent + "\n~~~";
            navigator.clipboard.writeText(forumReadyText);
            
            const originalText = copyTildesBtn.textContent;
            copyTildesBtn.textContent = "[ COPIED! ]";
            setTimeout(() => copyTildesBtn.textContent = originalText, 2000);
        });

        downloadBtn.addEventListener('click', () => {
            if(!currentMediaUrl) return alert("Upload fucking media first.");
            const blob = new Blob([output.textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = isVideo ? `ascii_frame_${video.currentTime.toFixed(2)}s.txt` : 'ascii_export.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        downloadPngBtn.addEventListener('click', () => {
            if(!output.textContent || output.textContent.includes("WAITING FOR INPUT")) {
                alert("Render a fucking image first.");
                return;
            }

            const lines = output.textContent.split('\n');
            if(lines[lines.length-1] === '') lines.pop(); 

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const fontSize = 10;
            const lineHeight = 10;
            ctx.font = `${fontSize}px 'Courier New', Courier, monospace`;
            
            let maxWidth = 0;
            for(let line of lines) {
                let metrics = ctx.measureText(line);
                if(metrics.width > maxWidth) maxWidth = metrics.width;
            }
            
            canvas.width = maxWidth + 30; 
            canvas.height = (lines.length * lineHeight) + 30;
            
            const isLight = document.body.classList.contains('light-theme');
            ctx.fillStyle = isLight ? '#ffffff' : '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = isLight ? '#000000' : '#d1d1d1';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.font = `${fontSize}px 'Courier New', Courier, monospace`;
            
            for(let i=0; i<lines.length; i++) {
                ctx.fillText(lines[i], 15, 15 + (i * lineHeight));
            }
            
            const url = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = url;
            a.download = isVideo ? `ascii_frame_${video.currentTime.toFixed(2)}s.png` : 'ascii_export.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
