<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRICT INDUSTRIAL ASCII</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #050505; 
            color: #8c8c8c; 
            text-align: center; 
            padding: 20px;
            text-transform: uppercase;
            border: 8px solid #3a0000;
            min-height: 90vh;
        }
        h2 { color: #9e1a1a; letter-spacing: 2px; border-bottom: 2px solid #3a0000; display: inline-block; }
        
        #output-container {
            margin-top: 20px;
            background: #000;
            border: 2px solid #333;
            display: inline-block;
            max-width: 95vw;
            overflow: auto;
        }

        pre { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 10px; 
            line-height: 1em;
            letter-spacing: 0;
            white-space: pre;
            margin: 0;
            padding: 10px;
            color: #d1d1d1;
            display: block;
            text-align: left;
        }

        .controls { 
            margin-bottom: 20px; 
            background: #111;
            padding: 15px;
            display: inline-block;
            border: 1px solid #3a0000;
        }
        button, input, select { 
            padding: 8px; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 5px; 
            background: #000;
            color: #9e1a1a;
            border: 1px solid #444;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background: #9e1a1a; color: #000; cursor: pointer; }
        
        label { margin: 0 10px; }
    </style>
</head>
<body>

    <h2>Terminal: Image-to-ASCII</h2>
    
    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        <br>
        <label>Width: <input type="range" id="widthSlider" min="20" max="200" value="80"></label>
        <span id="widthValue">80</span>
        
        <label id="thresholdContainer" style="display: none;">Threshold: <input type="range" id="thresholdSlider" min="1" max="254" value="128"></label>
        <span id="thresholdValue" style="display: none;">128</span>

        <label><input type="checkbox" id="invertCheck"> Invert</label>

        <select id="charMode">
            <option value="blocks">Mode: Unicode Blocks (Straightest)</option>
            <option value="standard">Mode: Standard ASCII</option>
            <option value="braille">Mode: Braille (Dot Art)</option>
        </select>

        <button id="copyBtn">Copy Output</button>
    </div>

    <div id="output-container">
        <pre id="output">WAITING FOR INPUT...</pre>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const output = document.getElementById('output');
        const widthSlider = document.getElementById('widthSlider');
        const widthValue = document.getElementById('widthValue');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdValue = document.getElementById('thresholdValue');
        const thresholdContainer = document.getElementById('thresholdContainer');
        const charMode = document.getElementById('charMode');
        const invertCheck = document.getElementById('invertCheck');
        const copyBtn = document.getElementById('copyBtn');

        const ramps = {
            standard: " .:-=+*#%@",
            blocks: " ░▒▓█"
        };

        const brailleMap = [
            [0, 0, 0x01],[1, 0, 0x08],
            [0, 1, 0x02],[1, 1, 0x10],
            [0, 2, 0x04],[1, 2, 0x20],
            [0, 3, 0x40], [1, 3, 0x80]
        ];

        let img = new Image();

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { img.src = event.target.result; };
            reader.readAsDataURL(file);
        });

        img.onload = () => draw();
        
        widthSlider.addEventListener('input', () => { 
            widthValue.textContent = widthSlider.value; 
            draw(); 
        });

        thresholdSlider.addEventListener('input', () => { 
            thresholdValue.textContent = thresholdSlider.value; 
            draw(); 
        });

        invertCheck.addEventListener('change', draw);

        charMode.addEventListener('change', (e) => {
            if (e.target.value === 'braille') {
                thresholdContainer.style.display = 'inline-block';
                thresholdValue.style.display = 'inline-block';
            } else {
                thresholdContainer.style.display = 'none';
                thresholdValue.style.display = 'none';
            }
            draw();
        });

        function draw() {
            if (!img.src) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const outWidthChars = parseInt(widthSlider.value);
            const mode = charMode.value;
            const invert = invertCheck.checked;
            
            let asciiStr = "";

            if (mode === 'braille') {
                const fontAspectRatio = 0.5; 
                const outHeightChars = Math.floor((img.height / img.width) * outWidthChars * fontAspectRatio);
                
                const pixelWidth = outWidthChars * 2;
                const pixelHeight = outHeightChars * 4;

                canvas.width = pixelWidth;
                canvas.height = pixelHeight;
                ctx.drawImage(img, 0, 0, pixelWidth, pixelHeight);
                const pixels = ctx.getImageData(0, 0, pixelWidth, pixelHeight).data;
                const threshold = parseInt(thresholdSlider.value);

                for (let y = 0; y < outHeightChars; y++) {
                    for (let x = 0; x < outWidthChars; x++) {
                        const px = x * 2;
                        const py = y * 4;
                        let brailleChar = 0;

                        for (let i = 0; i < brailleMap.length; i++) {
                            const dx = brailleMap[i][0];
                            const dy = brailleMap[i][1];
                            const val = brailleMap[i][2];

                            const idx = ((py + dy) * pixelWidth + (px + dx)) * 4;
                            const brightness = (0.299 * pixels[idx] + 0.587 * pixels[idx+1] + 0.114 * pixels[idx+2]);
                            
                            const isSolid = invert ? (brightness <= threshold) : (brightness > threshold);
                            
                            if (isSolid) {
                                brailleChar += val;
                            }
                        }
                        asciiStr += String.fromCharCode(0x2800 + brailleChar);
                    }
                    asciiStr += "\n";
                }
            } else {
                const fontAspectRatio = 0.55; 
                const pixelHeight = Math.floor((img.height / img.width) * outWidthChars * fontAspectRatio);
                
                canvas.width = outWidthChars;
                canvas.height = pixelHeight;
                ctx.drawImage(img, 0, 0, outWidthChars, pixelHeight);
                
                const pixels = ctx.getImageData(0, 0, outWidthChars, pixelHeight).data;
                let ramp = ramps[mode];
                
                if (invert) {
                    ramp = ramp.split('').reverse().join('');
                }

                for (let y = 0; y < pixelHeight; y++) {
                    for (let x = 0; x < outWidthChars; x++) {
                        const i = (y * outWidthChars + x) * 4;
                        const brightness = (0.299 * pixels[i] + 0.587 * pixels[i+1] + 0.114 * pixels[i+2]);
                        const charIndex = Math.floor((brightness / 255) * (ramp.length - 1));
                        asciiStr += ramp[charIndex];
                    }
                    asciiStr += "\n";
                }
            }
            output.textContent = asciiStr;
        }

        copyBtn.addEventListener('click', () => {
            const forumReadyText = "```text\n" + output.textContent + "\n```";
            navigator.clipboard.writeText(forumReadyText);
            alert("COPIED. MARKDOWN BLOCK APPLIED FOR FORUM POSTING.");
        });
    </script>
</body>
</html>
